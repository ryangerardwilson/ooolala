services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ooolala_dev
      POSTGRES_USER: ooolala
      POSTGRES_PASSWORD: ooolala
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ooolala -d ooolala_dev"]
      interval: 2s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql

volumes:
  postgres-data:
